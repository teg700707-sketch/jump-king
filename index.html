<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>심연의 점프킹 (Abyss Jumper)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #ffffff;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background-color: #1e293b;
            max-width: 100%;
            max-height: 100vh;
        }
        /* 터치 조작 시 텍스트 드래그 방지 */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-slate-950 p-2 md:p-3 no-select">

    <!-- 상단 헤더 / 게임 정보 -->
    <div class="w-full max-w-[400px] mb-1.5 flex justify-between items-center px-2">
        <div>
            <h1 class="text-lg font-black text-amber-400 tracking-wider leading-tight">심연의 점프킹</h1>
            <p class="text-[10px] text-slate-400">게이지를 모아 높이 뛰어오르세요!</p>
        </div>
        <div class="text-right">
            <span id="stage-display" class="bg-amber-500/20 text-amber-400 border border-amber-500/30 px-2.5 py-0.5 rounded text-xs font-bold">
                STAGE 1
            </span>
        </div>
    </div>

    <!-- 메인 게임 영역 (반응형 뷰포트 높이 제한 추가로 하단 잘림 해결) -->
    <div class="relative w-full max-w-[400px] aspect-[4/5] max-h-[50vh] sm:max-h-[58vh] md:max-h-[62vh] bg-slate-900 rounded-lg overflow-hidden border-2 border-slate-700">
        <!-- 캔버스 -->
        <canvas id="gameCanvas" width="480" height="600" class="w-full h-full"></canvas>

        <!-- 게임 오버 / 승리 화면 오버레이 -->
        <div id="overlay" class="absolute inset-0 bg-slate-950/90 flex flex-col items-center justify-center hidden z-10 p-6 text-center">
            <h2 id="overlay-title" class="text-3xl font-extrabold text-red-500 mb-4">GAME OVER</h2>
            <p id="overlay-desc" class="text-slate-300 mb-6">목숨을 모두 잃었습니다.</p>
            <button id="restart-btn" class="px-6 py-3 bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold rounded-lg transition-transform transform active:scale-95 text-lg">
                다시 도전하기
            </button>
        </div>

        <!-- 게임 튜토리얼 / 안내 -->
        <div id="tutorial" class="absolute bottom-4 left-4 right-4 bg-slate-950/80 p-3 rounded border border-slate-800 text-xs text-slate-400 text-center pointer-events-none transition-opacity duration-1000">
            <p class="font-bold text-amber-400 mb-1">🎮 조작법</p>
            <p>PC: 좌우 방향키 (이동) | Space 꾹 누르기 (점프 충전)</p>
            <p class="mt-1">★ 공중에서도 이동 키로 조작이 가능합니다!</p>
        </div>
    </div>

    <!-- 하단 모바일 컨트롤러 -->
    <div class="w-full max-w-[400px] mt-3 grid grid-cols-2 gap-3 px-2">
        <!-- 좌우 이동 조이스틱 대체용 터치 버튼 -->
        <div class="flex gap-2">
            <button id="btn-left" class="flex-1 h-12 bg-slate-800 active:bg-slate-700 border border-slate-700 rounded-lg flex items-center justify-center text-xl active:scale-95 transition-all">
                ◀
            </button>
            <button id="btn-right" class="flex-1 h-12 bg-slate-800 active:bg-slate-700 border border-slate-700 rounded-lg flex items-center justify-center text-xl active:scale-95 transition-all">
                ▶
            </button>
        </div>
        <!-- 점프 충전 버튼 -->
        <button id="btn-jump" class="h-12 bg-amber-500 active:bg-amber-600 text-slate-950 font-extrabold rounded-lg flex flex-col items-center justify-center active:scale-95 transition-all leading-tight">
            <span class="text-base">JUMP</span>
            <span class="text-[9px] opacity-75">누르고 있으면 충전</span>
        </button>
    </div>

    <!-- 오디오 효과용 (Web Audio API 사용으로 외부 리소스 의존 없음) -->
    <script>
        // --- Web Audio API를 이용한 사운드 제어 ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioCtx();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                const now = audioCtx.currentTime;

                if (type === 'jump') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                } else if (type === 'fall') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.4);
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                } else if (type === 'land') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.setValueAtTime(80, now + 0.05);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                    osc.start(now);
                    osc.stop(now + 0.08);
                } else if (type === 'win') {
                    const notes = [261.63, 329.63, 392.00, 523.25];
                    notes.forEach((freq, idx) => {
                        const s = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        s.connect(g);
                        g.connect(audioCtx.destination);
                        s.type = 'sine';
                        s.frequency.setValueAtTime(freq, now + idx * 0.1);
                        g.gain.setValueAtTime(0.15, now + idx * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.1 + 0.2);
                        s.start(now + idx * 0.1);
                        s.stop(now + idx * 0.1 + 0.2);
                    });
                } else if (type === 'gameover') {
                    const notes = [220.00, 207.65, 196.00, 164.81];
                    notes.forEach((freq, idx) => {
                        const s = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        s.connect(g);
                        g.connect(audioCtx.destination);
                        s.type = 'sawtooth';
                        s.frequency.setValueAtTime(freq, now + idx * 0.15);
                        g.gain.setValueAtTime(0.2, now + idx * 0.15);
                        g.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.15 + 0.3);
                        s.start(now + idx * 0.15);
                        s.stop(now + idx * 0.15 + 0.3);
                    });
                }
            } catch (e) {
                console.log("오디오 재생 오류:", e);
            }
        }
    </script>

    <!-- 메인 게임 스크립트 -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI 요소
        const stageDisplay = document.getElementById('stage-display');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const restartBtn = document.getElementById('restart-btn');
        const tutorial = document.getElementById('tutorial');

        // 터치 컨트롤 버튼들
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnJump = document.getElementById('btn-jump');

        // --- 게임 물리 및 환경 상태 ---
        const GRAVITY = 0.35;
        const FRICTION = 0.85;
        const MAX_JUMP_FORCE = 12;
        const MAX_STAGE = 5;
        
        // 이동 속도 설정 조정
        const MOVE_SPEED = 2.2; 
        const AIR_CONTROL_SPEED = 1.2; // 공중 수평 관성 보정 감도

        // 키 상태 입력 관리
        const keys = {
            left: false,
            right: false,
            space: false
        };

        // 모바일 입력 보정 상태
        let isTouchLeft = false;
        let isTouchRight = false;
        let isTouchJump = false;

        // 게임 핵심 상태 변수
        let currentStage = 1;
        let playerLives = 3;
        let gameActive = true;
        let hasWon = false;

        // 플레이어 오브젝트
        const player = {
            x: 50,
            y: 500,
            width: 20,
            height: 30,
            vx: 0,
            vy: 0,
            isGrounded: false,
            isCharging: false,
            chargePower: 0,
            facing: 'right',
            color: '#fbbf24', // 기본 엠버 골드 색상
            jumpDirection: 0,
            
            // 점프 충전 시작
            startCharge() {
                if (this.isGrounded && !this.isCharging) {
                    this.isCharging = true;
                    this.chargePower = 0;
                }
            },

            // 충전 업데이트
            updateCharge() {
                if (this.isCharging) {
                    this.chargePower += 0.3;
                    if (this.chargePower > MAX_JUMP_FORCE) {
                        this.chargePower = MAX_JUMP_FORCE;
                    }
                }
            },

            // 점프 실행
            releaseJump() {
                if (this.isCharging && this.isGrounded) {
                    this.vy = -this.chargePower;
                    
                    let moveDir = 0;
                    if (keys.left || isTouchLeft) moveDir = -1;
                    else if (keys.right || isTouchRight) moveDir = 1;
                    else {
                        moveDir = this.facing === 'left' ? -0.2 : 0.2;
                    }

                    this.vx = moveDir * (this.chargePower * 0.45);
                    this.isGrounded = false;
                    this.isCharging = false;
                    playSound('jump');
                }
            },

            resetPosition() {
                const stageStartPos = getStageStartPosition(currentStage);
                this.x = stageStartPos.x;
                this.y = stageStartPos.y;
                this.vx = 0;
                this.vy = 0;
                this.isGrounded = false;
                this.isCharging = false;
                this.chargePower = 0;
            }
        };

        // --- 스테이지 구조 디자인 ---
        function getStageStartPosition(stage) {
            switch(stage) {
                case 1: return { x: 60, y: 500 };
                case 2: return { x: 50, y: 500 };
                case 3: return { x: 230, y: 520 };
                case 4: return { x: 40, y: 510 };
                case 5: return { x: 220, y: 520 };
                default: return { x: 60, y: 500 };
            }
        }

        function getStageBgColor(stage) {
            switch(stage) {
                case 1: return '#1e293b'; 
                case 2: return '#111827'; 
                case 3: return '#0f172a'; 
                case 4: return '#090d16'; 
                case 5: return '#020617'; 
                default: return '#1e293b';
            }
        }

        // 맵 플랫폼 리스트 관리
        let platforms = [];
        let movingPlatforms = [];
        let hazards = []; 

        // 스테이지 구성 생성기
        function buildStage(stage) {
            platforms = [];
            movingPlatforms = [];
            hazards = [];

            // 기본 공통 벽 테두리
            platforms.push({ x: -10, y: 0, width: 20, height: 600, type: 'wall' });
            platforms.push({ x: 470, y: 0, width: 20, height: 600, type: 'wall' });
            
            // 바닥 위험 요소 (가시밭)
            if (stage === 1) {
                platforms.push({ x: 0, y: 550, width: 480, height: 50, type: 'floor' });
            } else {
                const startPos = getStageStartPosition(stage);
                platforms.push({ x: startPos.x - 30, y: startPos.y + 40, width: 80, height: 40, type: 'floor' });
                hazards.push({ x: 0, y: 580, width: 480, height: 20 });
            }

            // 골인 포탈 배치
            let portalX = 220;
            let portalY = 60;
            if (stage === 2) { portalX = 40; portalY = 80; }
            if (stage === 3) { portalX = 400; portalY = 70; }
            if (stage === 4) { portalX = 220; portalY = 50; }
            if (stage === 5) { portalX = 230; portalY = 50; }

            platforms.push({ x: portalX, y: portalY, width: 40, height: 10, type: 'portal' });

            // 단계별 레벨 디자인
            if (stage === 1) {
                platforms.push({ x: 100, y: 440, width: 140, height: 20, type: 'normal' });
                platforms.push({ x: 280, y: 350, width: 130, height: 20, type: 'normal' });
                platforms.push({ x: 80, y: 260, width: 140, height: 20, type: 'normal' });
                platforms.push({ x: 220, y: 150, width: 120, height: 20, type: 'normal' });
            } 
            else if (stage === 2) {
                platforms.push({ x: 150, y: 460, width: 100, height: 18, type: 'normal' });
                platforms.push({ x: 300, y: 380, width: 90, height: 18, type: 'normal' });
                platforms.push({ x: 140, y: 300, width: 110, height: 18, type: 'normal' });
                platforms.push({ x: 280, y: 210, width: 90, height: 18, type: 'normal' });
                platforms.push({ x: 100, y: 140, width: 80, height: 18, type: 'normal' });
            } 
            else if (stage === 3) {
                platforms.push({ x: 120, y: 450, width: 80, height: 15, type: 'normal' });
                platforms.push({ x: 320, y: 390, width: 80, height: 15, type: 'normal' });
                
                movingPlatforms.push({
                    x: 100, y: 290, width: 75, height: 15,
                    startX: 80, endX: 300, vx: 1.5, dir: 1
                });

                platforms.push({ x: 280, y: 190, width: 80, height: 15, type: 'normal' });
                platforms.push({ x: 150, y: 120, width: 70, height: 15, type: 'normal' });
            } 
            else if (stage === 4) {
                platforms.push({ x: 150, y: 450, width: 70, height: 15, type: 'normal' });
                
                movingPlatforms.push({
                    x: 250, y: 380, width: 70, height: 15,
                    startX: 120, endX: 380, vx: 2.2, dir: -1
                });

                platforms.push({ x: 80, y: 290, width: 60, height: 15, type: 'normal' });
                
                movingPlatforms.push({
                    x: 150, y: 210, width: 70, height: 15,
                    startX: 50, endX: 350, vx: 3.0, dir: 1
                });

                platforms.push({ x: 220, y: 120, width: 60, height: 15, type: 'normal' });
            } 
            else if (stage === 5) {
                platforms.push({ x: 340, y: 460, width: 50, height: 15, type: 'normal' });
                platforms.push({ x: 180, y: 390, width: 50, height: 15, type: 'normal' });
                
                movingPlatforms.push({
                    x: 50, y: 320, width: 55, height: 15,
                    startX: 30, endX: 200, vx: 3.2, dir: 1
                });

                platforms.push({ x: 260, y: 250, width: 45, height: 15, type: 'normal' });
                
                movingPlatforms.push({
                    x: 120, y: 170, width: 50, height: 15,
                    startX: 80, endX: 380, vx: 4.0, dir: -1
                });

                platforms.push({ x: 220, y: 100, width: 45, height: 15, type: 'normal' });
            }
        }

        // --- 물리 충돌 감지 및 해결 ---
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function handlePlatformCollisions() {
            let onPlatform = false;
            const allPlatforms = [...platforms, ...movingPlatforms];

            for (let plat of allPlatforms) {
                if (checkCollision(player, plat)) {
                    if (plat.type === 'wall') {
                        if (player.vx > 0 && player.x + player.width - player.vx <= plat.x) {
                            player.x = plat.x - player.width;
                            player.vx = -player.vx * 0.6; 
                        } else if (player.vx < 0 && player.x - player.vx >= plat.x + plat.width) {
                            player.x = plat.x + plat.width;
                            player.vx = -player.vx * 0.6;
                        }
                        continue;
                    }

                    if (plat.type === 'portal') {
                        nextStage();
                        return;
                    }

                    if (player.vy >= 0 && (player.y + player.height - player.vy) <= plat.y + 4) {
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        
                        if (!player.isGrounded) {
                            player.isGrounded = true;
                            player.vx = 0; 
                            playSound('land');
                        }
                        onPlatform = true;

                        if (plat.vx !== undefined) {
                            player.x += plat.vx * plat.dir;
                        }
                    } 
                    else if (player.vy < 0 && (player.y - player.vy) >= plat.y + plat.height - 4) {
                        player.y = plat.y + plat.height;
                        player.vy = 0;
                    }
                    else {
                        if (player.vx > 0) {
                            player.x = plat.x - player.width;
                            player.vx = -player.vx * 0.5;
                        } else if (player.vx < 0) {
                            player.x = plat.x + plat.width;
                            player.vx = -player.vx * 0.5;
                        }
                    }
                }
            }

            if (!onPlatform) {
                player.isGrounded = false;
            }
        }

        function checkHazards() {
            if (player.y > 600) {
                playerHurt();
                return;
            }

            for (let hz of hazards) {
                if (checkCollision(player, hz)) {
                    playerHurt();
                    return;
                }
            }
        }

        function playerHurt() {
            if (!gameActive) return;
            
            playerLives--;
            playSound('fall');

            if (playerLives <= 0) {
                gameOver();
            } else {
                showFlashEffect();
                player.resetPosition();
            }
        }

        let flashOpacity = 0;
        function showFlashEffect() {
            flashOpacity = 0.8;
        }

        function gameOver() {
            gameActive = false;
            playSound('gameover');
            overlay.classList.remove('hidden');
            overlayTitle.textContent = "GAME OVER";
            overlayTitle.className = "text-3xl font-extrabold text-red-500 mb-4";
            overlayDesc.innerHTML = `심연의 깊이를 이기지 못했습니다.<br><span class="text-xs text-amber-400">스테이지 1부터 다시 시작합니다.</span>`;
            restartBtn.textContent = "처음부터 다시 도전";
        }

        function gameComplete() {
            gameActive = false;
            hasWon = true;
            playSound('win');
            overlay.classList.remove('hidden');
            overlayTitle.textContent = "🎉 전설 달성! 🎉";
            overlayTitle.className = "text-3xl font-extrabold text-amber-400 mb-4";
            overlayDesc.innerHTML = `당신은 마침내 모든 심연을 뚫고 정점에 올랐습니다!<br><span class="text-sm text-slate-300">위대한 점프 마스터의 탄생을 축하합니다.</span>`;
            restartBtn.textContent = "처음부터 다시 플레이";
        }

        function nextStage() {
            if (currentStage >= MAX_STAGE) {
                gameComplete();
            } else {
                currentStage++;
                playerLives = 3; 
                playSound('win');
                stageDisplay.textContent = `STAGE ${currentStage}`;
                
                buildStage(currentStage);
                player.resetPosition();
                showFlashEffect();
            }
        }

        function restartGame() {
            overlay.classList.add('hidden');
            
            if (hasWon || playerLives <= 0) {
                currentStage = 1;
            }
            
            playerLives = 3;
            gameActive = true;
            hasWon = false;
            stageDisplay.textContent = `STAGE ${currentStage}`;
            
            buildStage(currentStage);
            player.resetPosition();
        }

        restartBtn.addEventListener('click', restartGame);

        // --- 키 입력 이벤트 리스너 ---
        window.addEventListener('keydown', (e) => {
            initAudio(); 
            if (!gameActive) return;

            if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                keys.left = true;
                player.facing = 'left';
            }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                keys.right = true;
                player.facing = 'right';
            }
            if (e.code === 'Space') {
                if (player.isGrounded) {
                    player.startCharge();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (!gameActive) return;

            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'Space') {
                player.releaseJump();
            }
        });

        // --- 모바일 및 터치 인터랙션 설정 ---
        function setupTouchControls() {
            btnLeft.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                isTouchLeft = true;
                player.facing = 'left';
            });
            btnLeft.addEventListener('touchend', (e) => {
                e.preventDefault();
                isTouchLeft = false;
            });

            btnRight.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                isTouchRight = true;
                player.facing = 'right';
            });
            btnRight.addEventListener('touchend', (e) => {
                e.preventDefault();
                isTouchRight = false;
            });

            btnJump.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                if (player.isGrounded) {
                    isTouchJump = true;
                    player.startCharge();
                }
            });
            btnJump.addEventListener('touchend', (e) => {
                e.preventDefault();
                isTouchJump = false;
                player.releaseJump();
            });

            // 마우스 클릭 대체 지원
            btnLeft.addEventListener('mousedown', () => { isTouchLeft = true; player.facing = 'left'; });
            btnLeft.addEventListener('mouseup', () => { isTouchLeft = false; });
            btnLeft.addEventListener('mouseleave', () => { isTouchLeft = false; });

            btnRight.addEventListener('mousedown', () => { isTouchRight = true; player.facing = 'right'; });
            btnRight.addEventListener('mouseup', () => { isTouchRight = false; });
            btnRight.addEventListener('mouseleave', () => { isTouchRight = false; });

            btnJump.addEventListener('mousedown', () => { if (player.isGrounded) { isTouchJump = true; player.startCharge(); } });
            btnJump.addEventListener('mouseup', () => { isTouchJump = false; player.releaseJump(); });
        }

        // --- 게임 업데이트 & 렌더링 프레임 루프 ---
        function update() {
            if (!gameActive) return;

            // 1. 수평 이동 가속도 연산
            if (player.isGrounded) {
                if (!player.isCharging) {
                    if (keys.left || isTouchLeft) {
                        player.vx = -MOVE_SPEED; 
                    } else if (keys.right || isTouchRight) {
                        player.vx = MOVE_SPEED;  
                    } else {
                        player.vx *= FRICTION; 
                        if (Math.abs(player.vx) < 0.1) player.vx = 0;
                    }
                } else {
                    player.vx = 0;
                }
            } else {
                // 공중 상태 (Air Control)
                if (keys.left || isTouchLeft) {
                    player.vx = -AIR_CONTROL_SPEED;
                    player.facing = 'left';
                } else if (keys.right || isTouchRight) {
                    player.vx = AIR_CONTROL_SPEED;
                    player.facing = 'right';
                }
                player.vx *= 0.98;
            }

            // 2. 수직 이동 (중력 연산)
            player.vy += GRAVITY;

            // 3. 점프 힘 충전 상태 연산
            player.updateCharge();

            // 4. 임시 위치 이동 후 충돌 정밀 처리
            player.x += player.vx;
            player.y += player.vy;

            // 5. 무빙 플랫폼 위치 이동 연산
            for (let mp of movingPlatforms) {
                mp.x += mp.vx * mp.dir;
                if (mp.x <= mp.startX) {
                    mp.x = mp.startX;
                    mp.dir = 1;
                } else if (mp.x + mp.width >= mp.endX) {
                    mp.x = mp.endX - mp.width;
                    mp.dir = -1;
                }
            }

            handlePlatformCollisions();
            checkHazards();

            if (flashOpacity > 0) {
                flashOpacity -= 0.05;
            }
        }

        // 디자인 에셋 그리기
        function draw() {
            ctx.fillStyle = getStageBgColor(currentStage);
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 그리드 장식
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let j = 0; j < canvas.height; j += 40) {
                ctx.beginPath();
                ctx.moveTo(0, j);
                ctx.lineTo(canvas.width, j);
                ctx.stroke();
            }

            // 가시(Hazard) 렌더링
            ctx.fillStyle = '#ef4444'; 
            for (let hz of hazards) {
                const toothWidth = 10;
                const toothHeight = 15;
                const count = Math.ceil(hz.width / toothWidth);
                for (let i = 0; i < count; i++) {
                    ctx.beginPath();
                    ctx.moveTo(hz.x + (i * toothWidth), hz.y + hz.height);
                    ctx.lineTo(hz.x + (i * toothWidth) + (toothWidth / 2), hz.y);
                    ctx.lineTo(hz.x + ((i + 1) * toothWidth), hz.y + hz.height);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // 발판(Platforms) 렌더링 - 흰색(White) 테마
            for (let plat of platforms) {
                if (plat.type === 'wall') continue; 

                if (plat.type === 'portal') {
                    const pulse = Math.sin(Date.now() / 150) * 4;
                    ctx.fillStyle = '#10b981'; 
                    ctx.fillRect(plat.x - 2, plat.y - 2 - pulse/2, plat.width + 4, plat.height + 4 + pulse, 6);
                    ctx.fillStyle = '#34d399';
                    ctx.fillRect(plat.x, plat.y - pulse/2, plat.width, plat.height + pulse, 4);

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 9px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('PORTAL', plat.x + plat.width / 2, plat.y - 12);
                } else {
                    ctx.fillStyle = '#f8fafc'; 
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    
                    ctx.fillStyle = '#ffffff'; 
                    ctx.fillRect(plat.x, plat.y, plat.width, 3);
                    
                    ctx.fillStyle = '#cbd5e1'; 
                    ctx.fillRect(plat.x, plat.y + plat.height - 3, plat.width, 3);
                }
            }

            // 무빙 발판(Moving Platforms) 렌더링
            for (let mp of movingPlatforms) {
                ctx.fillStyle = '#e2e8f0'; 
                ctx.fillRect(mp.x, mp.y, mp.width, mp.height);
                
                ctx.fillStyle = '#f1f5f9';
                ctx.fillRect(mp.x, mp.y, mp.width, 3);

                ctx.fillStyle = '#3b82f6';
                ctx.fillRect(mp.x + (mp.width / 2) - 10, mp.y + (mp.height / 2) - 2, 20, 4);
            }

            // 플레이어 렌더링
            ctx.save();
            ctx.fillStyle = player.color;
            let playerH = player.height;
            let playerY = player.y;
            if (player.isCharging) {
                const ratio = player.chargePower / MAX_JUMP_FORCE;
                playerH = player.height * (1 - ratio * 0.35);
                playerY = player.y + (player.height - playerH);
                ctx.fillStyle = '#f59e0b'; 
            }

            drawRoundedRect(ctx, player.x, playerY, player.width, playerH, 4);
            ctx.fill();

            // 눈동자 렌더링
            ctx.fillStyle = '#ffffff';
            const eyeY = playerY + 6;
            let eyeX = player.x + 3;
            if (player.facing === 'right') {
                eyeX = player.x + player.width - 9;
            }
            ctx.fillRect(eyeX, eyeY, 6, 6);
            ctx.fillStyle = '#000000';
            const pupilX = player.facing === 'right' ? eyeX + 3 : eyeX + 1;
            ctx.fillRect(pupilX, eyeY + 1, 3, 3);

            // 게이지 디스플레이
            if (player.isCharging) {
                const gaugeWidth = (player.chargePower / MAX_JUMP_FORCE) * player.width;
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(player.x, playerY - 8, player.width, 4);
                ctx.fillStyle = '#10b981';
                ctx.fillRect(player.x, playerY - 8, gaugeWidth, 4);
            }
            ctx.restore();

            // 목숨 표시
            ctx.fillStyle = '#ef4444';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left';
            let hearts = "";
            for (let i = 0; i < playerLives; i++) {
                hearts += "♥ ";
            }
            ctx.fillText(`LIVES: ${hearts}`, 20, 35);

            // 조작 상태 알림판
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`STAGE ${currentStage} / 5`, canvas.width - 20, 33);

            if (flashOpacity > 0) {
                ctx.fillStyle = `rgba(255, 0, 0, ${flashOpacity * 0.4})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function drawRoundedRect(context, x, y, width, height, radius) {
            context.beginPath();
            context.moveTo(x + radius, y);
            context.lineTo(x + width - radius, y);
            context.quadraticCurveTo(x + width, y, x + width, y + radius);
            context.lineTo(x + width, y + height - radius);
            context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            context.lineTo(x + radius, y + height);
            context.quadraticCurveTo(x, y + height, x, y + height - radius);
            context.lineTo(x, y + radius);
            context.quadraticCurveTo(x, y, x + radius, y);
            context.closePath();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.onload = function() {
            buildStage(1);
            player.resetPosition();
            setupTouchControls();
            
            setTimeout(() => {
                tutorial.style.opacity = '0';
            }, 5000);

            loop();
        };
    </script>
</body>
